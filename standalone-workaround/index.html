<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <link rel="manifest" href="manifest.json" />
    <title>Cutout Test – Standalone + JS Fullscreen</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100dvh;
        background: #16a34a;
        font-family: sans-serif;
        color: white;
      }

      .content {
        position: fixed;
        top: 50%;
        left: 20px;
        right: 20px;
        transform: translateY(-50%);
        text-align: center;
      }

      h1 {
        font-size: 18px;
        margin-bottom: 8px;
      }
      p {
        font-size: 14px;
        margin-bottom: 16px;
        opacity: 0.9;
      }

      button {
        padding: 12px 20px;
        font-size: 15px;
        border: none;
        border-radius: 8px;
        background: white;
        color: black;
        font-weight: bold;
        cursor: pointer;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="content">
      <h1>✅ display: standalone + JS requestFullscreen()</h1>
      <p>
        Tap once to enter fullscreen — green covers the camera cutout correctly.
      </p>
      <button id="install-btn">Install PWA</button>
    </div>

    <script>
      let deferredPrompt;
      const btn = document.getElementById("install-btn");

      window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        deferredPrompt = e;
        btn.style.display = "block";
      });

      btn.addEventListener("click", () => {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => {
          btn.style.display = "none";
          deferredPrompt = null;
        });
      });

      const isInstalled = window.matchMedia(
        "(display-mode: standalone)",
      ).matches;
      if (isInstalled && navigator.maxTouchPoints > 0) {
        document.addEventListener(
          "click",
          () => {
            if (!document.fullscreenElement) {
              document.documentElement.requestFullscreen().catch(() => {});
            }
          },
          { once: true },
        );
      }
    </script>
  </body>
</html>
