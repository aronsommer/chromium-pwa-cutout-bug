<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <link rel="manifest" href="manifest.json" />
    <title>Cutout Test – Manifest Fullscreen</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100dvh;
        background: #16a34a;
        font-family: sans-serif;
        color: white;
      }

      /* Label sitting just below the black bar to explain it */
      .black-bar-label {
        position: fixed;
        top: calc(env(safe-area-inset-top) + 4px);
        left: 0;
        right: 0;
        text-align: center;
        font-size: 16px;
        font-weight: bold;
      }

      .content {
        position: fixed;
        top: 50%;
        left: 20px;
        right: 20px;
        transform: translateY(-50%);
        text-align: center;
      }

      h1 {
        font-size: 18px;
        margin-bottom: 8px;
      }
      p {
        font-size: 14px;
        margin-bottom: 16px;
        opacity: 0.9;
      }

      button {
        padding: 12px 20px;
        font-size: 15px;
        border: none;
        border-radius: 8px;
        background: white;
        color: black;
        font-weight: bold;
        cursor: pointer;
        display: none;
      }

      .diagnostic {
        margin-top: 16px;
        background: rgba(0, 0, 0, 0.35);
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 13px;
        font-family: monospace;
        text-align: left;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div id="sat-probe" style="position:fixed;top:0;left:0;width:0;height:env(safe-area-inset-top);pointer-events:none;visibility:hidden;"></div>
    <div class="black-bar-label">
      ⬆️ Black bar here (system cutout) — should be green
    </div>
    <div class="content">
      <h1>❌ display: fullscreen (manifest only)</h1>
      <p>
        viewport-fit=cover is set but the camera cutout area shows a black bar
        instead of green.
      </p>
      <button id="install-btn">Install PWA</button>
      <div class="diagnostic" id="diagnostic">
        env(safe-area-inset-top): <span id="sat-value">reading…</span>
      </div>
    </div>

    <script>
      let deferredPrompt;
      const btn = document.getElementById("install-btn");

      window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        deferredPrompt = e;
        btn.style.display = "inline-block";
      });

      btn.addEventListener("click", () => {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => {
          btn.style.display = "none";
          deferredPrompt = null;
        });
      });

      const satValue = document.getElementById("sat-probe").offsetHeight + "px";
      document.getElementById("sat-value").textContent = satValue;
    </script>
  </body>
</html>
